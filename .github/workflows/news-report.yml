name: Collect News & Update Dashboard

on:
  schedule:
    # 매시간 정각 (대시보드 데이터 갱신)
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      report_type:
        description: '보고서 유형'
        required: true
        default: 'hourly'
        type: choice
        options:
          - hourly
          - weekly
          - monthly

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine report type and date
        id: params
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          HOUR=$(TZ=Asia/Seoul date +%H)
          DAY_OF_MONTH=$(TZ=Asia/Seoul date +%d)
          DAY_OF_WEEK=$(TZ=Asia/Seoul date +%u)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
          elif [ "$DAY_OF_MONTH" = "01" ] && [ "$DAY_OF_WEEK" = "1" ] && [ "$HOUR" = "10" ]; then
            echo "type=both" >> $GITHUB_OUTPUT
          elif [ "$DAY_OF_MONTH" = "01" ] && [ "$HOUR" = "10" ]; then
            echo "type=monthly" >> $GITHUB_OUTPUT
          elif [ "$DAY_OF_WEEK" = "1" ] && [ "$HOUR" = "10" ]; then
            echo "type=weekly" >> $GITHUB_OUTPUT
          else
            echo "type=hourly" >> $GITHUB_OUTPUT
          fi
          echo "date=$TODAY" >> $GITHUB_OUTPUT

      - name: Create directories
        run: mkdir -p reports/weekly reports/monthly data

      - name: Run hourly dashboard update
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/collect_news.py --type hourly --date ${{ steps.params.outputs.date }}

      - name: Run weekly report
        if: steps.params.outputs.type == 'weekly' || steps.params.outputs.type == 'both'
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/collect_news.py --type weekly --date ${{ steps.params.outputs.date }}

      - name: Run monthly report
        if: steps.params.outputs.type == 'monthly' || steps.params.outputs.type == 'both'
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/collect_news.py --type monthly --date ${{ steps.params.outputs.date }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data (${{ steps.params.outputs.type }}) ${{ steps.params.outputs.date }}"
          git push
